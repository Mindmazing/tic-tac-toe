<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <script src="./index.js" defer></script>
    <link rel="stylesheet" href="./CSS/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="player-container" id="player-1">
        <div class="player-score" id="player-1-score">
          <p>Player Score</p>
          <div class="score">0</div>
        </div>
        <h2 class="player-name">Player 1</h2>
        <form>
          <input
            type="text"
            placeholder="Player 1 Name"
            id="player-1-name"
            name="player-1-name"
          />
          <button type="submit">Submit</button>
        </form>
      </div>
      <div class="game-area">
        <div class="game-title">
          <h1>TIC TAC TOE</h1>
        </div>
        <div class="game-container">
          <div class="tile"></div>
          <div class="tile"></div>
          <div class="tile"></div>
          <div class="tile"></div>
          <div class="tile"></div>
          <div class="tile"></div>
          <div class="tile"></div>
          <div class="tile"></div>
          <div class="tile"></div>
        </div>
        <div class="game-buttons">
          <button id="reset-btn">Reset</button>
          <button id="rematch-btn">Rematch</button>
        </div>
      </div>

      <div class="player-container" id="player-2">
        <div class="player-score" id="player-2-score">
          <p>Player Score</p>
          <div class="score">0</div>
        </div>
        <h2 class="player-name">Player 2</h2>
        <form>
          <input
            type="text"
            placeholder="Player 2 Name"
            id="player-2-name"
            name="player-2-name"
          />
          <button type="submit">Submit</button>
        </form>
      </div>
    </div>
  </body>
</html>
